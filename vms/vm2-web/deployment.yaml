apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm2-web
  namespace: fallilou-dev
  labels:
    app: vm2-web
    zone: dmz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm2-web
  template:
    metadata:
      labels:
        app: vm2-web
        zone: dmz
        kubevirt.io/domain: vm2-web
    spec:
      containers:
        - name: nginx-nodejs
          image: node:18-slim
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update -qq && \
              apt-get install -y -qq nginx curl default-mysql-client && \
              mkdir -p /opt/app && \
              cat > /opt/app/package.json << 'EOF'
              {"name":"app","version":"1.0.0","dependencies":{"express":"^4.18.2","mysql2":"^3.6.0"}}
              EOF
              cat > /opt/app/index.js << 'EOF'
              const express = require('express');
              const mysql = require('mysql2/promise');
              const app = express();
              const PORT = process.env.PORT || 3000;
              app.get('/', async (req, res) => {
                try {
                  const conn = await mysql.createConnection({
                    host: process.env.DB_HOST || 'vm3-db-svc',
                    user: 'appuser',
                    password: 'AppPassword123x',
                    database: 'appdb'
                  });
                  const [rows] = await conn.execute('SELECT NOW() AS time, VERSION() AS version');
                  await conn.end();
                  res.json({ status: 'OK', vm: 'vm2-web (conteneur)', db: rows[0] });
                } catch(e) {
                  res.status(500).json({ status: 'DB_ERROR', error: e.message });
                }
              });
              app.get('/health', (_, res) => res.json({ status: 'UP', vm: 'vm2-web' }));
              app.listen(PORT, () => console.log('App on port ' + PORT));
              EOF
              cd /opt/app && npm install && \
              cat > /etc/nginx/sites-available/default << 'EOF'
              server {
                listen 80;
                server_name _;
                location / { proxy_pass http://127.0.0.1:3000; }
                location /health { proxy_pass http://127.0.0.1:3000/health; }
              }
              EOF
              nginx && node /opt/app/index.js
          env:
            - name: DB_HOST
              value: "vm3-db-svc"
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 80
            - containerPort: 3000
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: vm2-web-svc
  namespace: fallilou-dev
  labels:
    app: vm2-web
spec:
  selector:
    app: vm2-web
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: vm2-web-route
  namespace: fallilou-dev
spec:
  to:
    kind: Service
    name: vm2-web-svc
  port:
    targetPort: http
  tls:
    termination: edge
