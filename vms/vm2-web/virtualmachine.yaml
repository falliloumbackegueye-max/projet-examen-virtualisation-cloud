apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm2-web
    app: vm2-web
spec:
  running: true
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm2-web-rootdisk
      spec:
        source:
          http:
            url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 20Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm2-web
        app: vm2-web
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 2Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
        machine:
          type: pc-q35-rhel9.2.0
        firmware:
          bootloader:
            efi: {}
        features:
          smm:
            enabled: true
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm2-web-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: ubuntu
              password: Ubuntu2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              package_update: true
              packages:
                - nginx
                - nodejs
                - npm
                - git
                - curl
                - mysql-client
              write_files:
                - path: /opt/app/index.js
                  permissions: '0644'
                  content: |
                    const express = require('express');
                    const mysql = require('mysql2/promise');
                    const app = express();
                    const PORT = process.env.PORT || 3000;
                    app.get('/', async (req, res) => {
                      try {
                        const conn = await mysql.createConnection({
                          host: process.env.DB_HOST || 'vm3-db',
                          user: 'appuser',
                          password: 'AppPassword123x',
                          database: 'appdb'
                        });
                        const [rows] = await conn.execute('SELECT NOW() AS time');
                        await conn.end();
                        res.json({ status: 'OK', vm: 'vm2-web', db: rows[0] });
                      } catch(e) {
                        res.status(500).json({ status: 'DB_ERROR', error: e.message });
                      }
                    });
                    app.get('/health', (_, res) => res.json({ status: 'UP' }));
                    app.listen(PORT, () => console.log('App on port ' + PORT));
                - path: /opt/app/package.json
                  permissions: '0644'
                  content: |
                    {"name":"app","version":"1.0.0","dependencies":{"express":"^4.18.2","mysql2":"^3.6.0"}}
                - path: /etc/nginx/sites-available/nodeapp
                  permissions: '0644'
                  content: |
                    server {
                      listen 80;
                      server_name _;
                      location / { proxy_pass http://127.0.0.1:3000; }
                    }
                - path: /etc/systemd/system/nodeapp.service
                  permissions: '0644'
                  content: |
                    [Unit]
                    Description=Node.js App
                    After=network.target
                    [Service]
                    User=ubuntu
                    WorkingDirectory=/opt/app
                    ExecStart=/usr/bin/node index.js
                    Restart=on-failure
                    [Install]
                    WantedBy=multi-user.target
              runcmd:
                - cd /opt/app && npm install
                - chown -R ubuntu:ubuntu /opt/app
                - ln -sf /etc/nginx/sites-available/nodeapp /etc/nginx/sites-enabled/
                - rm -f /etc/nginx/sites-enabled/default
                - nginx -t && systemctl restart nginx
                - systemctl daemon-reload
                - systemctl enable nodeapp
                - systemctl start nodeapp
