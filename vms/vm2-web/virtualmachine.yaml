apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm2-web
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm2-web
    app: vm2-web
    zone: dmz
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm2-web-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 32Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm2-web
        app: vm2-web
        zone: dmz
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 1Gi
        resources:
          requests:
            memory: 1Gi
            cpu: "250m"
          limits:
            memory: 1Gi
            cpu: "500m"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm2-web-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm2-web
              user: fedora
              password: Fedora2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              package_update: true
              packages:
                - nginx
                - nodejs
                - npm
                - git
                - curl
              write_files:
                - path: /opt/app/package.json
                  permissions: '0644'
                  content: |
                    {"name":"app","version":"1.0.0","dependencies":{"express":"^4.18.2","mysql2":"^3.6.0"}}
                - path: /opt/app/index.js
                  permissions: '0644'
                  content: |
                    const express = require('express');
                    const app = express();
                    const PORT = process.env.PORT || 3000;
                    app.get('/', (_,res) => res.json({status:'OK',vm:'vm2-web (VM KubeVirt)',zone:'DMZ'}));
                    app.get('/health', (_,res) => res.json({status:'UP'}));
                    app.listen(PORT, () => console.log('App on port '+PORT));
                - path: /etc/nginx/conf.d/nodeapp.conf
                  permissions: '0644'
                  content: |
                    server {
                      listen 80;
                      server_name _;
                      location / { proxy_pass http://127.0.0.1:3000; }
                    }
                - path: /etc/systemd/system/nodeapp.service
                  permissions: '0644'
                  content: |
                    [Unit]
                    Description=Node.js App
                    After=network.target
                    [Service]
                    User=fedora
                    WorkingDirectory=/opt/app
                    ExecStart=/usr/bin/node index.js
                    Restart=on-failure
                    [Install]
                    WantedBy=multi-user.target
              runcmd:
                - cd /opt/app && npm install
                - systemctl daemon-reload
                - systemctl enable nodeapp
                - systemctl start nodeapp
                - systemctl enable nginx
                - systemctl start nginx
                - firewall-cmd --permanent --add-port=80/tcp
                - firewall-cmd --permanent --add-port=3000/tcp
                - firewall-cmd --reload
