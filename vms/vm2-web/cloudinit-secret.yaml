apiVersion: v1
kind: Secret
metadata:
  name: vm2-web-cloudinit
  namespace: fallilou-dev
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: vm2-web
    user: fedora
    password: Fedora2024x
    chpasswd: { expire: False }
    ssh_pwauth: true
    packages:
      - nginx
      - nodejs
      - npm
      - iproute
      - git
    write_files:
      - path: /opt/app/package.json
        permissions: '0644'
        content: |
          {
            "name": "projet-web",
            "version": "1.0.0",
            "dependencies": {
              "express": "^4.18.2",
              "mysql2": "^3.6.0"
            }
          }
      - path: /opt/app/index.js
        permissions: '0644'
        content: |
          const express = require('express');
          const mysql = require('mysql2/promise');
          const app = express();
          const PORT = 3000;

          const dbConfig = {
            host: '192.168.10.20',
            port: 3306,
            user: 'appuser',
            password: 'AppPassword123x',
            database: 'appdb'
          };

          app.get('/', async (req, res) => {
            try {
              const conn = await mysql.createConnection(dbConfig);
              const [rows] = await conn.execute('SELECT * FROM etudiants LIMIT 10');
              await conn.end();
              res.json({
                status: 'OK',
                vm: 'VM2-Web',
                zone: 'DMZ - 192.168.100.10',
                db_host: '192.168.10.20 (VM3-DB via LAN)',
                etudiants: rows
              });
            } catch(e) {
              res.status(500).json({
                status: 'DB_ERROR',
                vm: 'VM2-Web',
                zone: 'DMZ - 192.168.100.10',
                error: e.message
              });
            }
          });

          app.get('/health', (_, res) => res.json({
            status: 'UP',
            vm: 'VM2-Web',
            ip: '192.168.100.10',
            zone: 'DMZ',
            firewall: '192.168.100.1 (VM1)'
          }));

          app.listen(PORT, () => console.log('VM2 Web sur port ' + PORT));
      - path: /etc/nginx/conf.d/webapp.conf
        permissions: '0644'
        content: |
          server {
            listen 80;
            server_name _;
            location / {
              proxy_pass http://127.0.0.1:3000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
            }
          }
      - path: /etc/systemd/system/webapp.service
        permissions: '0644'
        content: |
          [Unit]
          Description=VM2 Node.js Web App
          After=network.target
          [Service]
          User=fedora
          WorkingDirectory=/opt/app
          ExecStart=/usr/bin/node index.js
          Restart=always
          [Install]
          WantedBy=multi-user.target
    runcmd:
      - ip link add dmz0 type dummy || true
      - ip addr add 192.168.100.10/24 dev dmz0 || true
      - ip link set dmz0 up
      - ip route add 192.168.10.0/24 via 192.168.100.1 dev dmz0 || true
      - cd /opt/app && npm install
      - chown -R fedora:fedora /opt/app
      - rm -f /etc/nginx/conf.d/default.conf
      - systemctl enable nginx
      - systemctl start nginx
      - systemctl daemon-reload
      - systemctl enable webapp
      - systemctl start webapp
      - firewall-cmd --permanent --add-port=80/tcp
      - firewall-cmd --permanent --add-port=3000/tcp
      - firewall-cmd --reload
