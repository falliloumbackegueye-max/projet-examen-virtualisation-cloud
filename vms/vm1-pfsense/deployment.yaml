apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm1-firewall
  namespace: fallilou-dev
  labels:
    app: vm1-firewall
    zone: wan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm1-firewall
  template:
    metadata:
      labels:
        app: vm1-firewall
        zone: wan
        kubevirt.io/domain: vm1-firewall
    spec:
      containers:
        - name: firewall
          image: ubuntu:22.04
          command: ["/bin/bash", "-c"]
          args:
            - |
              apt-get update -qq && \
              apt-get install -y -qq iptables iproute2 curl netcat-openbsd && \
              echo "=== VM1 pfSense — Règles firewall ===" && \
              iptables -P FORWARD DROP && \
              iptables -A FORWARD -p tcp --dport 80 -j ACCEPT && \
              iptables -A FORWARD -p tcp --dport 443 -j ACCEPT && \
              iptables -A FORWARD -p tcp --dport 3306 -j DROP && \
              iptables -A FORWARD -s 192.168.10.0/24 -j ACCEPT && \
              iptables -A FORWARD -d 192.168.10.0/24 -s 192.168.100.0/24 -j DROP && \
              echo "✅ Règles firewall appliquées" && \
              iptables -L -v && \
              tail -f /dev/null
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: vm1-firewall-svc
  namespace: fallilou-dev
  labels:
    app: vm1-firewall
spec:
  selector:
    app: vm1-firewall
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
  type: ClusterIP
