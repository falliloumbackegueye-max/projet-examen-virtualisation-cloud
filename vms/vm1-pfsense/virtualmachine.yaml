apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-pfsense
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm1-pfsense
    app: vm1-pfsense
    zone: wan
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm1-pfsense-rootdisk
      spec:
        source:
          registry:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 32Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm1-pfsense
        app: vm1-pfsense
        zone: wan
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 512Mi
        resources:
          requests:
            memory: 512Mi
            cpu: "250m"
          limits:
            memory: 512Mi
            cpu: "500m"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm1-pfsense-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm1-firewall
              user: fedora
              password: Fedora2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              packages:
                - iptables
                - iptables-services
              runcmd:
                # Règle 1 : WAN → DMZ HTTP/HTTPS autorisé
                - iptables -A FORWARD -p tcp --dport 80 -j ACCEPT
                - iptables -A FORWARD -p tcp --dport 443 -j ACCEPT
                # Règle 2 : WAN → LAN bloqué
                - iptables -A FORWARD -d 192.168.10.0/24 -j DROP
                # Règle 3 : LAN → Internet autorisé
                - iptables -A FORWARD -s 192.168.10.0/24 -j ACCEPT
                # Règle 4 : LAN → DMZ autorisé
                - iptables -A FORWARD -s 192.168.10.0/24 -d 192.168.100.0/24 -j ACCEPT
                # Règle 5 : DMZ → LAN bloqué
                - iptables -A FORWARD -s 192.168.100.0/24 -d 192.168.10.0/24 -j DROP
                # Règle 6 : DMZ → Internet HTTP/HTTPS autorisé
                - iptables -A FORWARD -s 192.168.100.0/24 -p tcp --dport 80 -j ACCEPT
                - iptables -A FORWARD -s 192.168.100.0/24 -p tcp --dport 443 -j ACCEPT
                # Règle 7 : défaut bloquer tout
                - iptables -P FORWARD DROP
                - systemctl enable iptables
                - service iptables save
