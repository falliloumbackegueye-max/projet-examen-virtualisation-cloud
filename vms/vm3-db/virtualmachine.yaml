apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm3-db
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm3-db
    app: vm3-db
    zone: lan
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm3-db
        app: vm3-db
        zone: lan
    spec:
      domain:
        cpu:
          cores: 2
        memory:
          guest: 2Gi
        resources:
          requests:
            memory: 2Gi
            cpu: "500m"
          limits:
            memory: 2Gi
            cpu: "2"
        devices:
          disks:
            - name: ubuntu-disk
              disk:
                bus: virtio
              bootOrder: 1
            - name: cloudinit-disk
              disk:
                bus: virtio
          interfaces:
            - name: pod-network
              masquerade: {}
              model: virtio
          rng: {}
      networks:
        - name: pod-network
          pod: {}
      volumes:
        - name: ubuntu-disk
          dataVolume:
            name: vm3-ubuntu-dv
        - name: cloudinit-disk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm3-db
              timezone: Africa/Dakar
              users:
                - name: ubuntu
                  groups: sudo
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  shell: /bin/bash
                  lock_passwd: false
                  passwd: $6$rounds=4096$sel$hashed
              ssh_pwauth: true
              package_update: true
              package_upgrade: true
              packages:
                - mysql-server
                - mysql-client
                - ufw
              write_files:
                - path: /etc/mysql/mysql.conf.d/99-projet.cnf
                  permissions: '0644'
                  content: |
                    [mysqld]
                    bind-address        = 0.0.0.0
                    mysqlx-bind-address = 0.0.0.0
                - path: /opt/mysql-init.sql
                  permissions: '0600'
                  content: |
                    DELETE FROM mysql.user WHERE User='';
                    ALTER USER 'root'@'localhost'
                      IDENTIFIED WITH mysql_native_password BY 'RootPassword123!';
                    CREATE DATABASE IF NOT EXISTS appdb
                      CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                    CREATE USER IF NOT EXISTS 'appuser'@'%'
                      IDENTIFIED WITH mysql_native_password BY 'AppPassword123!';
                    GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';
                    USE appdb;
                    CREATE TABLE IF NOT EXISTS test_connexion (
                      id INT AUTO_INCREMENT PRIMARY KEY,
                      message VARCHAR(255) NOT NULL,
                      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                    );
                    INSERT INTO test_connexion (message)
                      VALUES ('Connexion VM2 vers VM3 OK !');
                    FLUSH PRIVILEGES;
              runcmd:
                - systemctl start mysql
                - mysql -u root < /opt/mysql-init.sql
                - rm -f /opt/mysql-init.sql
                - systemctl restart mysql
                - systemctl enable mysql
                - ufw allow 22/tcp
                - ufw allow 3306/tcp
                - ufw --force enable
              final_message: "VM3 DB prete !"
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: vm3-ubuntu-dv
  namespace: fallilou-dev
spec:
  source:
    http:
      url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
  storage:
    storageClassName: gp3
    resources:
      requests:
        storage: 20Gi
    accessModes:
      - ReadWriteOnce
