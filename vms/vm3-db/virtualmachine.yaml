apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm3-db
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm3-db
    app: vm3-db
    zone: lan
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm3-db-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 32Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm3-db
        app: vm3-db
        zone: lan
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 512Mi
        resources:
          requests:
            memory: 512Mi
            cpu: "250m"
          limits:
            memory: 512Mi
            cpu: "500m"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm3-db-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm3-db
              user: fedora
              password: Fedora2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              package_update: true
              packages:
                - mysql-server
              write_files:
                - path: /etc/mysql/mysql.conf.d/99-projet.cnf
                  permissions: '0644'
                  content: |
                    [mysqld]
                    bind-address = 0.0.0.0
                - path: /opt/mysql-init.sql
                  permissions: '0600'
                  content: |
                    ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'RootPassword123x';
                    CREATE DATABASE IF NOT EXISTS appdb CHARACTER SET utf8mb4;
                    CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY 'AppPassword123x';
                    GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';
                    FLUSH PRIVILEGES;
              runcmd:
                - systemctl start mysqld
                - mysql -u root < /opt/mysql-init.sql
                - rm -f /opt/mysql-init.sql
                - systemctl enable mysqld
                - firewall-cmd --permanent --add-port=3306/tcp
                - firewall-cmd --reload
