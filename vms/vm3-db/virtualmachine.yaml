apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm3-db
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm3-db
    app: vm3-db
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm3-db-rootdisk
      spec:
        source:
          http:
            url: "https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img"
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 11Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm3-db
        app: vm3-db
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 2Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
        machine:
          type: q35
        firmware:
          bootloader:
            efi: {}
        features:
          smm:
            enabled: true
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm3-db-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm3-db
              user: ubuntu
              password: Ubuntu2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              package_update: true
              packages:
                - mysql-server
                - ufw
              write_files:
                - path: /etc/mysql/mysql.conf.d/99-projet.cnf
                  permissions: '0644'
                  content: |
                    [mysqld]
                    bind-address = 0.0.0.0
                - path: /opt/mysql-init.sql
                  permissions: '0600'
                  content: |
                    ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'RootPassword123x';
                    CREATE DATABASE IF NOT EXISTS appdb CHARACTER SET utf8mb4;
                    CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED WITH mysql_native_password BY 'AppPassword123x';
                    GRANT ALL PRIVILEGES ON appdb.* TO 'appuser'@'%';
                    FLUSH PRIVILEGES;
              runcmd:
                - systemctl start mysql
                - mysql -u root < /opt/mysql-init.sql
                - rm -f /opt/mysql-init.sql
                - systemctl enable mysql
                - ufw allow 22/tcp
                - ufw allow 3306/tcp
                - ufw --force enable
