apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm3-db
  namespace: fallilou-dev
  labels:
    app: vm3-db
    zone: lan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm3-db
  template:
    metadata:
      labels:
        app: vm3-db
        zone: lan
        kubevirt.io/domain: vm3-db
    spec:
      initContainers:
        - name: network-setup
          image: fedora:39
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Configuration réseau LAN vm3-db..."
              ip link add lan0 type dummy 2>/dev/null || true
              ip addr add 192.168.10.20/24 dev lan0 2>/dev/null || true
              ip link set lan0 up 2>/dev/null || true
              ip route add 192.168.100.0/24 via 192.168.10.1 dev lan0 2>/dev/null || true
              echo "✅ Interface LAN configurée : 192.168.10.20"
              ip addr show
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "RootPassword123x"
            - name: MYSQL_DATABASE
              value: "appdb"
            - name: MYSQL_USER
              value: "appuser"
            - name: MYSQL_PASSWORD
              value: "AppPassword123x"
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vm3-db-svc
  namespace: fallilou-dev
  labels:
    app: vm3-db
spec:
  selector:
    app: vm3-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP
