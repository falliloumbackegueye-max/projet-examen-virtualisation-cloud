apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm3-db
  namespace: fallilou-dev
  labels:
    app: vm3-db
    zone: lan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm3-db
  template:
    metadata:
      labels:
        app: vm3-db
        zone: lan
        kubevirt.io/domain: vm3-db
    spec:
      initContainers:
        - name: network-setup
          image: fedora:39
          command: ["/bin/sh", "-c"]
          args:
            - |
              ip link add lan0 type dummy 2>/dev/null || true
              ip addr add 192.168.10.20/24 dev lan0 2>/dev/null || true
              ip link set lan0 up 2>/dev/null || true
              ip route add 192.168.100.0/24 via 192.168.10.1 2>/dev/null || true
              echo "✅ VM3-DB LAN configuré : 192.168.10.20"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
        - name: mysql-init
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "RootPassword123x"
            - name: MYSQL_DATABASE
              value: "appdb"
            - name: MYSQL_USER
              value: "appuser"
            - name: MYSQL_PASSWORD
              value: "AppPassword123x"
          command: ["/bin/sh", "-c"]
          args:
            - |
              docker-entrypoint.sh mysqld --initialize-insecure &
              sleep 15
              mysql -u root -e "
                CREATE DATABASE IF NOT EXISTS appdb;
                CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED BY 'AppPassword123x';
                GRANT ALL ON appdb.* TO 'appuser'@'%';
                USE appdb;
                CREATE TABLE IF NOT EXISTS etudiants (
                  id INT AUTO_INCREMENT PRIMARY KEY,
                  nom VARCHAR(100) NOT NULL,
                  prenom VARCHAR(100) NOT NULL,
                  email VARCHAR(150) UNIQUE,
                  filiere VARCHAR(100),
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                );
                INSERT IGNORE INTO etudiants (nom,prenom,email,filiere) VALUES
                  ('Diallo','Mamadou','mamadou@univ.sn','Informatique'),
                  ('Sow','Fatou','fatou@univ.sn','Réseaux'),
                  ('Ndiaye','Ibrahima','ibrahima@univ.sn','Cloud'),
                  ('Ba','Aissatou','aissatou@univ.sn','Cybersécurité'),
                  ('Fall','Cheikh','cheikh@univ.sn','DevOps');
              " 2>/dev/null || true
              echo "✅ Base de données initialisée"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "RootPassword123x"
            - name: MYSQL_DATABASE
              value: "appdb"
            - name: MYSQL_USER
              value: "appuser"
            - name: MYSQL_PASSWORD
              value: "AppPassword123x"
          ports:
            - containerPort: 3306
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vm3-db-svc
  namespace: fallilou-dev
  labels:
    app: vm3-db
spec:
  selector:
    app: vm3-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP
