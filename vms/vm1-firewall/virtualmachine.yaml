apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm1-firewall
  namespace: fallilou-dev
  labels:
    kubevirt.io/domain: vm1-firewall
    app: vm1-firewall
    zone: wan
spec:
  runStrategy: Manual
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: vm1-firewall-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          storageClassName: gp3
          resources:
            requests:
              storage: 32Gi
          accessModes:
            - ReadWriteOnce
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm1-firewall
        app: vm1-firewall
        zone: wan
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        memory:
          guest: 512Mi
        resources:
          requests:
            memory: 512Mi
            cpu: "250m"
          limits:
            memory: 512Mi
            cpu: "500m"
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          rng: {}
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm1-firewall-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: vm1-firewall
              user: fedora
              password: Fedora2024x
              chpasswd: { expire: False }
              ssh_pwauth: true
              packages:
                - iptables
                - iptables-services
                - net-tools
                - iproute
              write_files:
                - path: /etc/systemd/system/firewall-setup.service
                  permissions: '0644'
                  content: |
                    [Unit]
                    Description=Firewall Setup - NAT Routage DMZ LAN
                    After=network.target
                    [Service]
                    Type=oneshot
                    RemainAfterExit=yes
                    ExecStart=/usr/local/bin/firewall-setup.sh
                    [Install]
                    WantedBy=multi-user.target
                - path: /usr/local/bin/firewall-setup.sh
                  permissions: '0755'
                  content: |
                    #!/bin/bash
                    # ═══════════════════════════════════════════════
                    # VM1 Firewall — NAT + Routage DMZ/LAN/WAN
                    # ═══════════════════════════════════════════════

                    # 1. Activer le forwarding IP
                    echo 1 > /proc/sys/net/ipv4/ip_forward

                    # 2. Créer interface virtuelle DMZ (192.168.100.0/24)
                    ip link add dmz0 type dummy 2>/dev/null || true
                    ip addr add 192.168.100.1/24 dev dmz0 2>/dev/null || true
                    ip link set dmz0 up

                    # 3. Créer interface virtuelle LAN (192.168.10.0/24)
                    ip link add lan0 type dummy 2>/dev/null || true
                    ip addr add 192.168.10.1/24 dev lan0 2>/dev/null || true
                    ip link set lan0 up

                    # 4. NAT masquerade vers Internet (WAN = eth0)
                    iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

                    # ── Règles de filtrage ──────────────────────────

                    # Règle 1 : WAN → DMZ HTTP/HTTPS autorisé
                    iptables -A FORWARD -i eth0 -o dmz0 -p tcp --dport 80  -j ACCEPT
                    iptables -A FORWARD -i eth0 -o dmz0 -p tcp --dport 443 -j ACCEPT

                    # Règle 2 : WAN → LAN bloqué
                    iptables -A FORWARD -i eth0 -o lan0 -j DROP

                    # Règle 3 : LAN → Internet autorisé
                    iptables -A FORWARD -i lan0 -o eth0 -j ACCEPT

                    # Règle 4 : LAN → DMZ autorisé
                    iptables -A FORWARD -i lan0 -o dmz0 -j ACCEPT

                    # Règle 5 : DMZ → LAN bloqué
                    iptables -A FORWARD -i dmz0 -o lan0 -j DROP

                    # Règle 6 : DMZ → Internet HTTP/HTTPS autorisé
                    iptables -A FORWARD -i dmz0 -o eth0 -p tcp --dport 80  -j ACCEPT
                    iptables -A FORWARD -i dmz0 -o eth0 -p tcp --dport 443 -j ACCEPT

                    # Règle 7 : Routage inter-zones établies (connexions existantes)
                    iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT

                    # Règle 8 : Politique par défaut DROP
                    iptables -P FORWARD DROP

                    # 5. Sauvegarder les règles
                    iptables-save > /etc/iptables/rules.v4 2>/dev/null || \
                    service iptables save 2>/dev/null || true

                    echo "✅ Firewall configuré"
                    echo "   WAN  : eth0 ($(ip -4 addr show eth0 | grep inet | awk '{print $2}'))"
                    echo "   DMZ  : dmz0 192.168.100.1/24"
                    echo "   LAN  : lan0 192.168.10.1/24"
                    ip addr show
                    iptables -L -v -n
              runcmd:
                - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
                - sysctl -p
                - systemctl enable firewall-setup
                - systemctl start firewall-setup
