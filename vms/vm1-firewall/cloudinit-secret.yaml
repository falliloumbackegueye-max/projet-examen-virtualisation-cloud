apiVersion: v1
kind: Secret
metadata:
  name: vm1-firewall-cloudinit
  namespace: fallilou-dev
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: vm1-firewall
    user: fedora
    password: Fedora2024x
    chpasswd: { expire: False }
    ssh_pwauth: true
    packages:
      - iptables
      - iptables-services
      - net-tools
      - iproute
      - tcpdump
    write_files:
      - path: /usr/local/bin/setup-firewall.sh
        permissions: '0755'
        content: |
          #!/bin/bash
          # ══════════════════════════════════════════════════════
          # VM1 FIREWALL — 3 interfaces + NAT + Règles filtrage
          # WAN  : eth0 (Internet NAT)
          # DMZ  : dmz0 192.168.100.1/24 (VM2 Web)
          # LAN  : lan0 192.168.10.1/24  (VM3 DB)
          # ══════════════════════════════════════════════════════

          # 1. Activer le routage IP
          echo 1 > /proc/sys/net/ipv4/ip_forward
          sysctl -w net.ipv4.ip_forward=1

          # 2. Interface DMZ — 192.168.100.1/24
          ip link add dmz0 type dummy 2>/dev/null || true
          ip addr flush dev dmz0 2>/dev/null || true
          ip addr add 192.168.100.1/24 dev dmz0
          ip link set dmz0 up

          # 3. Interface LAN — 192.168.10.1/24
          ip link add lan0 type dummy 2>/dev/null || true
          ip addr flush dev lan0 2>/dev/null || true
          ip addr add 192.168.10.1/24 dev lan0
          ip link set lan0 up

          # 4. NAT — masquerade sortie Internet
          iptables -t nat -F
          iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

          # 5. Vider les règles existantes
          iptables -F FORWARD

          # ── RÈGLES DE FILTRAGE ─────────────────────────────

          # Autoriser connexions établies
          iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT

          # Règle 1 : WAN → DMZ HTTP/HTTPS autorisé (accès public VM2)
          iptables -A FORWARD -i eth0 -o dmz0 -p tcp -m multiport --dports 80,443 -j ACCEPT

          # Règle 2 : WAN → LAN bloqué (VM3 DB jamais exposée)
          iptables -A FORWARD -i eth0 -o lan0 -j DROP

          # Règle 3 : LAN → Internet autorisé (VM3 peut se MAJ)
          iptables -A FORWARD -i lan0 -o eth0 -j ACCEPT

          # Règle 4 : LAN → DMZ autorisé (VM3 peut joindre VM2)
          iptables -A FORWARD -i lan0 -o dmz0 -j ACCEPT

          # Règle 5 : DMZ → LAN bloqué (VM2 ne peut pas joindre VM3)
          iptables -A FORWARD -i dmz0 -o lan0 -j DROP

          # Règle 6 : DMZ → Internet HTTP/HTTPS autorisé (MAJ VM2)
          iptables -A FORWARD -i dmz0 -o eth0 -p tcp -m multiport --dports 80,443 -j ACCEPT

          # Règle 7 : Politique par défaut DROP
          iptables -P FORWARD DROP

          # 6. Sauvegarder
          service iptables save 2>/dev/null || iptables-save > /etc/sysconfig/iptables

          echo "════════════════════════════════"
          echo "  VM1 FIREWALL CONFIGURÉ"
          echo "════════════════════════════════"
          ip addr show eth0 | grep "inet "
          ip addr show dmz0 | grep "inet "
          ip addr show lan0 | grep "inet "
          echo ""
          iptables -L FORWARD -v -n
      - path: /etc/systemd/system/vm1-firewall.service
        permissions: '0644'
        content: |
          [Unit]
          Description=VM1 Firewall NAT DMZ LAN
          After=network.target
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/local/bin/setup-firewall.sh
          [Install]
          WantedBy=multi-user.target
    runcmd:
      - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
      - systemctl daemon-reload
      - systemctl enable vm1-firewall
      - systemctl start vm1-firewall
