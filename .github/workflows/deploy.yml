name: Deploy to OpenShift Sandbox (fallilou-dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: fallilou-dev

jobs:
  deploy:
    name: Deploy VMs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -sLo oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux-amd64-rhel9.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift Sandbox
        run: |
          oc login \
            --token="${{ secrets.OC_TOKEN }}" \
            --server="${{ secrets.OC_SERVER }}" \
            --insecure-skip-tls-verify=true
          echo "✅ Connecté : $(oc whoami)"

      - name: NetworkPolicies
        run: |
          oc apply -f network/networkpolicy.yaml -n ${{ env.NAMESPACE }}
          echo "✅ NetworkPolicies appliquées"

      - name: VM1 Firewall (VM KubeVirt)
        run: |
          oc apply -f vms/vm1-firewall/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM1 Firewall appliquée"

      - name: VM2 Web (VM KubeVirt)
        run: |
          oc apply -f vms/vm2-web/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM2 Web appliquée"

      - name: ConfigMap app Node.js
        run: |
          oc create configmap vm2-app-code \
            --from-file=index.js=app/src/index.js \
            --from-literal=package.json='{"name":"app","version":"1.0.0","dependencies":{"express":"^4.18.2","mysql2":"^3.6.0"}}' \
            --dry-run=client -o yaml | oc apply -f - -n ${{ env.NAMESPACE }}
          echo "✅ ConfigMap app créé"

      - name: VM3 DB (conteneur MySQL)
        run: |
          oc apply -f vms/vm3-db/deployment.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM3 DB appliqué"

      - name: Résumé
        run: |
          echo "══════════════════════════════════════"
          echo "  DÉPLOIEMENT TERMINÉ"
          echo "══════════════════════════════════════"
          oc get vm -n ${{ env.NAMESPACE }} \
            -o custom-columns="NOM:.metadata.name,STATUT:.status.printableStatus,PRÊTE:.status.ready"
          echo ""
          oc get deployment vm3-db -n ${{ env.NAMESPACE }} \
            -o custom-columns="NOM:.metadata.name,DISPO:.status.availableReplicas"
