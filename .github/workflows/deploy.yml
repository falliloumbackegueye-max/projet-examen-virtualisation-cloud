name: Deploy to OpenShift Sandbox (fallilou-dev)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: fallilou-dev

jobs:
  deploy:
    name: Deploy VMs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install oc CLI
        run: |
          curl -sLo oc.tar.gz https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux-amd64-rhel9.tar.gz
          tar -xzf oc.tar.gz
          sudo mv oc /usr/local/bin/
          oc version --client

      - name: Login to OpenShift Sandbox
        run: |
          oc login \
            --token="${{ secrets.OC_TOKEN }}" \
            --server="${{ secrets.OC_SERVER }}" \
            --insecure-skip-tls-verify=true
          echo "✅ Connecté : $(oc whoami)"

      - name: Vérifier KubeVirt
        run: |
          oc api-resources | grep -q "virtualmachines" \
            && echo "✅ KubeVirt disponible" \
            || (echo "❌ KubeVirt non disponible" && exit 1)

      - name: Appliquer NetworkPolicies
        run: |
          oc apply -f network/networkpolicy.yaml -n ${{ env.NAMESPACE }}
          echo "✅ NetworkPolicies appliquées"

      - name: Créer DataVolumes (images OS)
        run: |
          oc apply -f vms/vm3-db/datavolume.yaml    -n ${{ env.NAMESPACE }}
          oc apply -f vms/vm2-web/datavolume.yaml   -n ${{ env.NAMESPACE }}
          oc apply -f vms/vm1-pfsense/datavolume.yaml -n ${{ env.NAMESPACE }}
          echo "✅ DataVolumes créés"

      - name: Déployer VM3 DB
        run: |
          oc apply -f vms/vm3-db/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM3 appliquée"

      - name: Déployer VM2 Web
        run: |
          oc apply -f vms/vm2-web/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM2 appliquée"

      - name: Déployer VM1 pfSense
        run: |
          oc apply -f vms/vm1-pfsense/virtualmachine.yaml -n ${{ env.NAMESPACE }}
          echo "✅ VM1 appliquée"

      - name: Résumé final
        run: |
          echo "══════════════════════════════════"
          oc get vm -n ${{ env.NAMESPACE }} \
            -o custom-columns="NOM:.metadata.name,STATUT:.status.printableStatus,PRÊTE:.status.ready"
          echo ""
          oc get dv -n ${{ env.NAMESPACE }} \
            -o custom-columns="NOM:.metadata.name,PHASE:.status.phase"
