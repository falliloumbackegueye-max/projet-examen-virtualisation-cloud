apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: dmz-network
  namespace: projet-fin-module
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/dmz-bridge
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "dmz-network",
      "type": "cnv-bridge",
      "bridge": "dmz-bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.100.0/24",
        "range_start": "192.168.100.10",
        "range_end": "192.168.100.200"
      }
    }
