---
# Politique 1 : VM3 (DB) n'accepte que les connexions de VM2 (Web) sur port 3306
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-allow-web-only
  namespace: projet-fin-module
spec:
  podSelector:
    matchLabels:
      kubevirt.io/domain: vm3-db
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              kubevirt.io/domain: vm2-web
      ports:
        - protocol: TCP
          port: 3306
  egress:
    # Autorise les réponses vers VM2
    - to:
        - podSelector:
            matchLabels:
              kubevirt.io/domain: vm2-web
    # Autorise DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Politique 2 : VM2 (Web) peut sortir vers Internet et parler à VM3
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: web-allow-egress
  namespace: projet-fin-module
spec:
  podSelector:
    matchLabels:
      kubevirt.io/domain: vm2-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Accepte le trafic entrant (HTTP/HTTPS depuis pfSense)
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 3000
  egress:
    # Vers VM3 MySQL
    - to:
        - podSelector:
            matchLabels:
              kubevirt.io/domain: vm3-db
      ports:
        - protocol: TCP
          port: 3306
    # Vers Internet (mises à jour, npm, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 192.168.10.0/24
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Politique 3 : Bloquer tout accès direct Internet → VM3
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-deny-internet
  namespace: projet-fin-module
spec:
  podSelector:
    matchLabels:
      kubevirt.io/domain: vm3-db
  policyTypes:
    - Ingress
  ingress:
    # Bloque tout sauf VM2 (déjà géré par db-allow-web-only)
    - from:
        - podSelector:
            matchLabels:
              kubevirt.io/domain: vm2-web
