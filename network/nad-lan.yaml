apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan-network
  namespace: projet-fin-module
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/lan-bridge
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "lan-network",
      "type": "cnv-bridge",
      "bridge": "lan-bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.10.0/24",
        "range_start": "192.168.10.10",
        "range_end": "192.168.10.200"
      }
    }
